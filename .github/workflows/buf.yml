name: Buf CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  buf:
    name: Proto Lint & Breaking Change Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Buf CLI
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint proto files
        uses: bufbuild/buf-lint-action@v1

      - name: Check for breaking changes
        uses: bufbuild/buf-breaking-action@v1
        with:
          against: 'https://github.com/${{ github.repository }}.git#branch=main'
        # Only runs on pull_request to avoid comparing main against itself
        if: github.event_name == 'pull_request'

      - name: Push schema to Buf Schema Registry
        uses: bufbuild/buf-push-action@v1
        # Only push to BSR on merge to main (not on pull requests)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          buf_token: ${{ secrets.BUF_TOKEN }}
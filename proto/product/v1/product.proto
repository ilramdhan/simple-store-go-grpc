syntax = "proto3";

package product.v1;

import "common/v1/common.proto";
import "google/api/annotations.proto";

option go_package = "github.com/ilramdhan/simple-store-go-grpc/gen/go/product/v1;productv1";

message Product {
  string id = 1;
  string name = 2;
  string description = 3;
  int64 price_cents = 4;
  int32 stock = 5;
  common.v1.AuditInfo audit = 6;
}

message CreateProductRequest {
  string name = 1;
  string description = 2;
  int64 price_cents = 3;
  int32 stock = 4;
}

message CreateProductResponse {
  common.v1.BaseResponse base = 1;
  Product product = 2;
}

message GetProductRequest {
  string id = 1;
}

message GetProductResponse {
  common.v1.BaseResponse base = 1;
  Product product = 2;
}

message UpdateProductRequest {
  string id = 1;
  optional string name = 2;
  optional string description = 3;
  optional int64 price_cents = 4;
  optional int32 stock = 5;
}

message UpdateProductResponse {
  common.v1.BaseResponse base = 1;
  Product product = 2;
}

message DeleteProductRequest {
  string id = 1;
}

message DeleteProductResponse {
  common.v1.BaseResponse base = 1;
}

message ListProductsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string search_name = 3;
  optional int64 min_price = 4;
}

message ListProductsResponse {
  common.v1.BaseResponse base = 1;
  repeated Product products = 2;
  common.v1.PaginationResponse pagination = 3;
}

service ProductService {
  rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse) {
    option (google.api.http) = {
      post: "/v1/products"
      body: "*"
    };
  }

  rpc GetProduct(GetProductRequest) returns (GetProductResponse) {
    option (google.api.http) = {
      get: "/v1/products/{id}"
    };
  }

  rpc UpdateProduct(UpdateProductRequest) returns (UpdateProductResponse) {
    option (google.api.http) = {
      patch: "/v1/products/{id}"
      body: "*"
    };
  }

  rpc DeleteProduct(DeleteProductRequest) returns (DeleteProductResponse) {
    option (google.api.http) = {
      delete: "/v1/products/{id}"
    };
  }

  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse) {
    option (google.api.http) = {
      get: "/v1/products"
    };
  }
}
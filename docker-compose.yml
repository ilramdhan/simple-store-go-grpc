services:
  # Database untuk Product & Order Service
  postgres:
    image: postgres:16-alpine
    container_name: store_postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Hanya bind ke localhost (127.0.0.1) untuk mencegah eksposur port ke public network
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - db_net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-simplestore}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # In-memory store untuk Caching dan Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: store_redis
    restart: unless-stopped
    # Mengamankan redis dengan password (didefinisikan di .env)
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:-redispass}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - cache_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # S3 Compatible Object Storage
  minio:
    image: minio/minio:latest
    container_name: store_minio
    restart: unless-stopped
    env_file:
      - .env
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000" # API Port
      - "127.0.0.1:9001:9001" # Console/UI Port
    volumes:
      - miniodata:/data
    networks:
      - storage_net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Jaeger Tracing (OpenTelemetry)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: store_jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "127.0.0.1:16686:16686" # Web UI
      - "127.0.0.1:4317:4317"   # OTLP gRPC receiver
      - "127.0.0.1:4318:4318"   # OTLP HTTP receiver
    networks:
      - obs_net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Pemisahan Jaringan (Network Isolation)
networks:
  db_net:
    driver: bridge
  cache_net:
    driver: bridge
  storage_net:
    driver: bridge
  obs_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  miniodata:

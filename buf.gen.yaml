version: v2
managed:
  enabled: true
  disable:
    - path: google
  override:
    - file_option: go_package_prefix
      value: github.com/ilramdhan/simple-store-go-grpc/gen/go
plugins:
  # Generate Go protobuf message types
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: gen/go
    opt:
      - paths=source_relative

  # Generate gRPC Go client/server stubs
  - remote: buf.build/grpc/go
    out: gen/go
    opt:
      - paths=source_relative
      - require_unimplemented_servers=true

  # Generate gRPC-Gateway HTTP reverse proxy
  - remote: buf.build/grpc-ecosystem/gateway:v2.29.0
    out: gen/go
    opt:
      - paths=source_relative
      - generate_unbound_methods=true

  # Generate OpenAPI v2 (Swagger) documentation
  - remote: buf.build/grpc-ecosystem/openapiv2:v2.29.0
    out: gen/openapiv2
    opt:
      - generate_unbound_methods=true
      - allow_merge=true
      - merge_file_name=api

inputs:
  - directory: proto
